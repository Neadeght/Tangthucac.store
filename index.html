<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON to SRT - Auto Magic</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #38bdf8;
            --success: #10b981;
            --text: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 3rem 2rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 { font-size: 1.8rem; margin-bottom: 0.5rem; color: var(--primary); }
        p.subtitle { color: #94a3b8; margin-bottom: 2rem; font-size: 0.95rem; }

        /* Vùng kéo thả */
        .dropzone {
            border: 2px dashed rgba(56, 189, 248, 0.4);
            border-radius: 16px;
            padding: 4rem 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(56, 189, 248, 0.05);
        }

        .dropzone:hover, .dropzone.dragover {
            border-color: var(--primary);
            background: rgba(56, 189, 248, 0.1);
        }

        .dropzone svg { width: 56px; height: 56px; color: var(--primary); margin-bottom: 1rem; }
        .dropzone h3 { font-size: 1.2rem; margin-bottom: 0.5rem; }

        /* Màn hình thành công */
        #successScreen { display: none; }
        #successScreen svg { width: 72px; height: 72px; color: var(--success); margin-bottom: 1rem; }
        
        button {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.8; }
        
        .error-msg { color: #ef4444; margin-top: 1rem; font-weight: 600; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Chuyển Đổi JSON Sang SRT</h1>
        <p class="subtitle">Không cần cài đặt. Thả file vào là nhận ngay file SRT.</p>

        <!-- Màn hình Kéo thả -->
        <div class="dropzone" id="dropzone">
            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.233-2.33 3 3 0 013.758 3.848A3.752 3.752 0 0118 19.5H6.75z"></path></svg>
            <h3>Kéo thả file JSON vào đây</h3>
            <p style="color: #94a3b8; font-size: 0.85rem;">Hoặc click để chọn file</p>
            <input type="file" id="fileInput" accept=".json" style="display: none;">
        </div>
        
        <p class="error-msg" id="errorMsg"></p>

        <!-- Màn hình Thành công -->
        <div id="successScreen">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <h2 style="color: var(--success); margin-bottom: 0.5rem;">Thành Công!</h2>
            <p style="color: #94a3b8;">File SRT của bạn đã tự động được tải xuống.</p>
            <button onclick="location.reload()">Chuyển File Khác</button>
        </div>
    </div>

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const successScreen = document.getElementById('successScreen');
        const errorMsg = document.getElementById('errorMsg');

        // Gắn sự kiện kéo thả
        dropzone.addEventListener('click', () => fileInput.click());
        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            if (e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) processFile(e.target.files[0]);
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = "block";
            setTimeout(() => errorMsg.style.display = "none", 4000);
        }

        function processFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const json = JSON.parse(e.target.result);
                    convertAndDownload(json);
                } catch (err) {
                    showError("File JSON bị lỗi hoặc không đọc được!");
                }
            };
            reader.readAsText(file);
        }

        // Lõi AI: Quét đệ quy tìm mảng phụ đề ẩn sâu trong JSON
        function findSubtitleArray(obj) {
            let bestArr = null;
            let maxScore = -1;

            function searchTree(node) {
                if (Array.isArray(node)) {
                    let score = scoreArray(node);
                    if (score > maxScore) { maxScore = score; bestArr = node; }
                    node.forEach(child => { if (typeof child === 'object' && child !== null) searchTree(child); });
                } else if (typeof node === 'object' && node !== null) {
                    for (let key in node) searchTree(node[key]);
                }
            }

            function scoreArray(arr) {
                if (arr.length === 0) return 0;
                let score = 0;
                let sample = arr[0];
                if (typeof sample === 'object' && sample !== null) {
                    let keys = Object.keys(sample).map(k => k.toLowerCase());
                    if (keys.some(k => k.includes('start') || k.includes('time') || k.includes('from'))) score += 10;
                    if (keys.some(k => k.includes('text') || k.includes('word') || k.includes('content'))) score += 10;
                    score += Math.min(arr.length, 50); // Mảng càng dài càng dễ là phụ đề
                }
                return score;
            }

            searchTree(obj);
            return maxScore > 10 ? bestArr : null;
        }

        // Lõi xử lý dữ liệu và tạo SRT
        function convertAndDownload(jsonObj) {
            const targetArray = findSubtitleArray(jsonObj);
            
            if (!targetArray) {
                showError("Không tìm thấy dữ liệu phụ đề (Text + Thời gian) trong file này!");
                return;
            }

            let sample = targetArray[0];
            let startKey = null, endKey = null, textKey = null;

            // Dò tìm Key nội dung Text
            const textCands = ['text', 'content', 'word', 'subtitle', 'transcript'];
            textKey = Object.keys(sample).find(k => textCands.some(c => k.toLowerCase().includes(c)));
            if(!textKey) textKey = Object.keys(sample).find(k => typeof sample[k] === 'string' && isNaN(sample[k]));

            // Dò tìm Key thời gian bắt đầu
            const startCands = ['start', 'from', 'time', 'begin'];
            startKey = Object.keys(sample).find(k => startCands.some(c => k.toLowerCase().includes(c)));
            if(!startKey) startKey = Object.keys(sample).find(k => k !== textKey && (typeof sample[k] === 'number' || !isNaN(parseFloat(sample[k]))));

            // Dò tìm Key thời gian kết thúc
            const endCands = ['end', 'to', 'stop'];
            endKey = Object.keys(sample).find(k => endCands.some(c => k.toLowerCase().includes(c)));

            if (!startKey || !textKey) {
                showError("Không phân tích được cấu trúc Thời gian & Nội dung!");
                return;
            }

            // Đoán xem thời gian là Giây hay Mili-giây
            let isMs = false;
            let maxTime = 0;
            targetArray.forEach(item => {
                let v = parseFloat(String(item[startKey]).replace(/[^0-9.]/g, ''));
                if (!isNaN(v) && v > maxTime) maxTime = v;
                if (String(item[startKey]).includes('.')) isMs = false; // Có dấu phẩy chắc chắn là giây
            });
            if (maxTime > 10000 && maxTime === Math.floor(maxTime)) isMs = true;

            // Sinh file SRT
            let srt = "";
            let count = 1;

            targetArray.forEach(item => {
                let text = item[textKey];
                if (text === undefined || text === null) return;
                
                let startRaw = item[startKey];
                let endRaw = endKey ? item[endKey] : null;

                let startNum = parseFloat(String(startRaw).replace(/[^0-9.]/g, ''));
                if (isNaN(startNum)) return;
                let endNum = endRaw ? parseFloat(String(endRaw).replace(/[^0-9.]/g, '')) : (startNum + 2); // Cộng 2 giây nếu ko có key kết thúc

                srt += `${count}\n${formatTime(startNum, isMs)} --> ${formatTime(endNum, isMs)}\n${text}\n\n`;
                count++;
            });

            // Ép tải xuống
            const blob = new Blob([srt], { type: "text/srt;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "phude_tudong.srt";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            // Chuyển giao diện
            dropzone.style.display = "none";
            successScreen.style.display = "block";
        }

        // Đổi thời gian ra định dạng chuẩn SRT (HH:MM:SS,mmm)
        function formatTime(val, isMs) {
            let ms = Math.round(isMs ? val : val * 1000);
            let h = Math.floor(ms / 3600000); ms %= 3600000;
            let m = Math.floor(ms / 60000); ms %= 60000;
            let s = Math.floor(ms / 1000); ms %= 1000;
            return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')},${String(ms).padStart(3,'0')}`;
        }
    </script>
</body>
</html>
