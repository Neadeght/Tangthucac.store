<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CapCut JSON ➔ SRT (Universal Version)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --text: #f8fafc;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        h1 { font-size: 2rem; margin-bottom: 0.5rem; color: #fff; }
        p.subtitle { color: #94a3b8; margin-bottom: 2rem; }

        .dropzone {
            border: 2px dashed rgba(59, 130, 246, 0.5);
            border-radius: 12px;
            padding: 3rem 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(59, 130, 246, 0.05);
            margin-bottom: 1.5rem;
        }

        .dropzone:hover { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
        .dropzone h3 { margin-bottom: 0.5rem; color: #fff; }

        .result-section { display: none; }
        .status-badge {
            display: inline-block; background: rgba(16, 185, 129, 0.15); color: var(--success);
            padding: 0.5rem 1.5rem; border-radius: 50px; font-weight: 600; margin-bottom: 1rem; border: 1px solid var(--success);
        }

        .btn-group { display: flex; gap: 1rem; justify-content: center; margin-bottom: 1.5rem; }
        button { border: none; padding: 0.8rem 2rem; border-radius: 8px; font-weight: 600; cursor: pointer; color: #fff; }
        .btn-secondary { background: #334155; }
        .btn-primary { background: var(--success); }
        button:hover { opacity: 0.8; }

        .preview-box {
            text-align: left; background: #0f172a; border: 1px solid var(--border); border-radius: 8px;
            padding: 1rem; height: 350px; overflow-y: auto; font-family: monospace; font-size: 0.95rem; color: #cbd5e1;
            white-space: pre-wrap;
        }

        .error-msg {
            color: #ef4444; background: rgba(239, 68, 68, 0.1); padding: 1rem; border-radius: 8px; font-weight: 600;
            display: none; margin-bottom: 1.5rem; border: 1px solid #ef4444;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>CapCut To SRT - Đa Nền Tảng</h1>
        <p class="subtitle">Bao thầu file JSON từ mọi phiên bản CapCut (PC, Mobile, Web)</p>

        <div class="dropzone" id="dropzone">
            <h3>Kéo thả file JSON vào đây</h3>
            <p style="color: #94a3b8;">Hoặc click để chọn file</p>
            <input type="file" id="fileInput" accept=".json" style="display: none;">
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <div class="result-section" id="resultSection">
            <div class="status-badge" id="statusBadge">Trích xuất thành công!</div>
            <div class="btn-group">
                <button class="btn-secondary" onclick="location.reload()">Chọn file khác</button>
                <button class="btn-primary" id="btnDownload">Tải File .SRT Xuống Máy</button>
            </div>
            <div class="preview-box" id="previewBox"></div>
        </div>
    </div>

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const errorMsg = document.getElementById('errorMsg');
        const resultSection = document.getElementById('resultSection');
        const statusBadge = document.getElementById('statusBadge');
        const previewBox = document.getElementById('previewBox');
        const btnDownload = document.getElementById('btnDownload');

        let finalSrt = "";

        dropzone.addEventListener('click', () => fileInput.click());
        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); });
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            if (e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) processFile(e.target.files[0]);
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = "block";
            dropzone.style.display = "block";
            resultSection.style.display = "none";
        }

        function processFile(file) {
            errorMsg.style.display = "none";
            const reader = new FileReader();
            reader.onload = function(e) {
                let json;
                // BƯỚC 1: KIỂM TRA LỖI FILE HỎNG (CORRUPTED)
                try {
                    json = JSON.parse(e.target.result);
                } catch (err) {
                    showError("Lỗi: Không thể đọc file. File JSON này đã bị hỏng cú pháp (Syntax Error).");
                    return;
                }
                
                // BƯỚC 2: TIẾN HÀNH GIẢI MÃ
                try {
                    executeConversion(json);
                } catch (err) {
                    console.error(err);
                    showError("Lỗi thuật toán xử lý: " + err.message + " (Vui lòng bấm F12 xem Console để biết chi tiết)");
                }
            };
            reader.readAsText(file);
        }

        function executeConversion(json) {
            let srtOutput = parseUniversalCapCut(json);

            if (!srtOutput || srtOutput.trim().length === 0) {
                showError("Thất bại: Đã quét nát file nhưng không tìm thấy dữ liệu phụ đề và thời gian.");
                return;
            }

            finalSrt = srtOutput.trim();
            const linesCount = (finalSrt.match(/-->/g) || []).length;
            
            dropzone.style.display = "none";
            resultSection.style.display = "block";
            statusBadge.innerHTML = `✅ Trích xuất thành công! Tổng ${linesCount} dòng phụ đề.`;
            previewBox.textContent = finalSrt;
        }

        // --- LÕI AI DEEP SCAN (QUÉT SÂU KHẮP FILE) ---
        function parseUniversalCapCut(json) {
            // 1. Quét Toàn Bộ File để tìm Nội Dung Phụ Đề (Mọi biến thể của CapCut)
            let textMap = {};
            function extractTexts(obj) {
                if (Array.isArray(obj)) {
                    obj.forEach(extractTexts);
                } else if (typeof obj === 'object' && obj !== null) {
                    // Cứ hễ thấy object nào có ID và chứa Content/Text là tóm gọn
                    if (obj.id && (obj.content || obj.text || obj.text_str)) {
                        let content = obj.content || obj.text || obj.text_str;
                        if (typeof content === 'string') {
                            if (content.trim().startsWith('[')) {
                                try {
                                    let parsed = JSON.parse(content);
                                    content = parsed.map(p => p.text || '').join(' ');
                                } catch(e) {}
                            }
                            content = content.replace(/<[^>]+>/g, '').trim();
                        } else {
                            content = String(content);
                        }
                        if (content) textMap[obj.id] = content;
                    }
                    for (let key in obj) { extractTexts(obj[key]); }
                }
            }
            extractTexts(json);

            // 2. Quét Toàn Bộ File để tìm Mốc Thời Gian (Gắn khớp với ID ở trên)
            let subtitles = [];
            function extractTimings(obj) {
                if (Array.isArray(obj)) {
                    obj.forEach(extractTimings);
                } else if (typeof obj === 'object' && obj !== null) {
                    let mId = obj.material_id || obj.id;
                    let tr = obj.target_timerange || obj.timerange || obj.time_range;
                    
                    if (mId && tr && textMap[mId]) {
                        let start = tr.start !== undefined ? tr.start : tr.startTime;
                        let duration = tr.duration;
                        
                        if (start !== undefined && duration !== undefined) {
                            // CapCut dùng Micro-giây (1 triệu = 1s)
                            let scale = 1000; 
                            if (duration > 0 && duration < 100000) scale = 1; // Đề phòng bản Mobile đổi sang Mili-giây

                            let startMs = start / scale;
                            let endMs = (start + duration) / scale;
                            
                            // Tránh thêm phụ đề bị trùng lặp thời gian
                            let exists = subtitles.find(s => s.id === mId && s.start === startMs);
                            if (!exists) {
                                subtitles.push({ id: mId, start: startMs, end: endMs, text: textMap[mId] });
                            }
                        }
                    }
                    for (let key in obj) { extractTimings(obj[key]); }
                }
            }
            extractTimings(json);

            if (subtitles.length === 0) return null;

            // 3. Sắp xếp và kết xuất SRT
            subtitles.sort((a, b) => a.start - b.start);
            let srt = "";
            subtitles.forEach((s, i) => {
                srt += `${i + 1}\n${formatSrtTime(s.start)} --> ${formatSrtTime(s.end)}\n${s.text}\n\n`;
            });
            return srt;
        }

        // Chuyển Mili-giây thành định dạng chuẩn SRT (HH:MM:SS,mmm)
        function formatSrtTime(ms) {
            if (isNaN(ms) || ms < 0) ms = 0;
            ms = Math.round(ms);
            let h = Math.floor(ms / 3600000); ms %= 3600000;
            let m = Math.floor(ms / 60000); ms %= 60000;
            let s = Math.floor(ms / 1000); ms %= 1000;
            return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')},${String(ms).padStart(3,'0')}`;
        }

        // Kích hoạt Tải xuống
        btnDownload.addEventListener('click', () => {
            if (!finalSrt) return;
            const blob = new Blob([finalSrt], { type: "text/srt;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "phude_capcut_chuan.srt";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
