<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CapCut ➔ SRT (Bản Tự Sửa Lỗi)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --card-bg: #1e293b; --primary: #3b82f6; --success: #10b981;
            --text: #f8fafc; --border: #334155;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; background-image: radial-gradient(circle at top right, rgba(59, 130, 246, 0.1), transparent 400px), radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.1), transparent 400px); }
        .container { width: 100%; max-width: 900px; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        h1 { font-size: 2.2rem; margin-bottom: 0.5rem; font-weight: 700; color: #ffffff; }
        p.subtitle { color: #94a3b8; margin-bottom: 2rem; }
        .dropzone { border: 2px dashed rgba(59, 130, 246, 0.4); border-radius: 16px; padding: 4rem 2rem; cursor: pointer; transition: all 0.3s ease; background: rgba(59, 130, 246, 0.03); margin-bottom: 1.5rem; }
        .dropzone:hover { border-color: var(--primary); background: rgba(59, 130, 246, 0.08); transform: translateY(-2px); }
        .dropzone h3 { margin-bottom: 0.5rem; color: #fff; }
        .result-section { display: none; }
        .status-badge { display: inline-flex; align-items: center; gap: 0.5rem; background: rgba(16, 185, 129, 0.1); color: var(--success); padding: 0.5rem 1.5rem; border-radius: 50px; font-weight: 600; margin-bottom: 1.5rem; border: 1px solid rgba(16, 185, 129, 0.2); }
        .btn-group { display: flex; gap: 1rem; justify-content: center; margin-bottom: 1.5rem; }
        button { border: none; padding: 0.8rem 2rem; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; color: #fff; }
        .btn-secondary { background: #334155; }
        .btn-secondary:hover { background: #475569; }
        .btn-primary { background: var(--success); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
        .btn-primary:hover { background: #059669; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4); }
        .preview-box { text-align: left; background: #0f172a; border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; height: 350px; overflow-y: auto; font-family: monospace; font-size: 0.95rem; color: #a7f3d0; white-space: pre-wrap; }
        .error-msg { color: #ef4444; background: rgba(239, 68, 68, 0.1); padding: 1rem; border-radius: 8px; font-weight: 600; display: none; margin-bottom: 1.5rem; border: 1px solid rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body>

    <div class="container">
        <h1>CapCut ➔ SRT (Có AI Sửa Lỗi)</h1>
        <p class="subtitle">Bản đặc biệt: Tự động fix lỗi nghe nhầm số (23 10 thành 20-30) của CapCut</p>

        <div class="dropzone" id="dropzone">
            <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="color: #3b82f6; margin-bottom: 1rem;"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"></path></svg>
            <h3>Kéo thả file draft_content.json vào đây</h3>
            <p style="color: #94a3b8;">Hệ thống sẽ lọc sạch rác và sửa luôn chính tả cho bạn</p>
            <input type="file" id="fileInput" accept=".json" style="display: none;">
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <div class="result-section" id="resultSection">
            <div class="status-badge" id="statusBadge">Trích xuất thành công!</div>
            <div class="btn-group">
                <button class="btn-secondary" onclick="location.reload()">Chọn file khác</button>
                <button class="btn-primary" id="btnDownload">Tải File .SRT Xuống Máy</button>
            </div>
            <div class="preview-box" id="previewBox"></div>
        </div>
    </div>

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const errorMsg = document.getElementById('errorMsg');
        const resultSection = document.getElementById('resultSection');
        const statusBadge = document.getElementById('statusBadge');
        const previewBox = document.getElementById('previewBox');
        const btnDownload = document.getElementById('btnDownload');

        let finalSrt = "";

        dropzone.addEventListener('click', () => fileInput.click());
        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.style.borderColor = '#3b82f6'; });
        dropzone.addEventListener('dragleave', () => dropzone.style.borderColor = 'rgba(59, 130, 246, 0.4)');
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            if (e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) processFile(e.target.files[0]);
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = "block";
            dropzone.style.display = "block";
            resultSection.style.display = "none";
        }

        function processFile(file) {
            errorMsg.style.display = "none";
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const json = JSON.parse(e.target.result);
                    executeConversion(json);
                } catch (err) {
                    showError("Lỗi: Không thể đọc file. File JSON hỏng cú pháp.");
                }
            };
            reader.readAsText(file);
        }

        function executeConversion(json) {
            let srtOutput = parseUniversalCapCut(json);

            if (!srtOutput || srtOutput.trim().length === 0) {
                showError("Thất bại: Không tìm thấy phụ đề nào hoặc file không đúng định dạng!");
                return;
            }

            finalSrt = srtOutput.trim();
            const linesCount = (finalSrt.match(/-->/g) || []).length;
            
            dropzone.style.display = "none";
            resultSection.style.display = "block";
            statusBadge.innerHTML = `✅ Tuyệt vời! Đã lọc sạch và sửa lỗi ${linesCount} dòng phụ đề.`;
            previewBox.textContent = finalSrt;
        }

        // BỘ TỪ ĐIỂN AUTO-CORRECT: TỰ ĐỘNG SỬA LỖI NHẬN DIỆN SỐ CỦA CAPCUT
        function autoCorrect(text) {
            const fixMap = {
                "12 10": "10-20",
                "23 10": "20-30",
                "34 10": "30-40",
                "45 10": "40-50",
                "56 10": "50-60",
                "67 10": "60-70",
                "78 10": "70-80",
                "89 10": "80-90"
            };
            for (let [wrong, correct] of Object.entries(fixMap)) {
                // Dùng Regex bọc chữ để tránh sửa nhầm những con số ngẫu nhiên
                text = text.replace(new RegExp(`\\b${wrong}\\b`, "g"), correct);
            }
            return text;
        }

        // HÀM MỔ XẺ LẤY CHỮ SẠCH 100%
        function cleanTextExtremely(obj) {
            let content = obj.text_str || obj.text || obj.content;
            if (content === null || content === undefined) return "";

            if (typeof content === 'object') {
                content = content.text_str || content.text || content.content || JSON.stringify(content);
            }

            if (typeof content === 'string') {
                content = content.replace(/<[^>]+>/g, '').trim();

                if (content.startsWith('{') || content.startsWith('[')) {
                    let parsedSuccess = false;
                    try {
                        let safeJson = content.replace(/\n/g, '\\n').replace(/\r/g, '');
                        let parsed = JSON.parse(safeJson);
                        if (Array.isArray(parsed)) {
                            let extracted = parsed.map(p => p.text || '').join(' ').trim();
                            if (extracted) { content = extracted; parsedSuccess = true; }
                        } else if (typeof parsed === 'object' && parsed !== null) {
                            if (parsed.text) { content = parsed.text; parsedSuccess = true; }
                        }
                    } catch(e) {}

                    if (!parsedSuccess) {
                        let match = content.match(/"text"\s*:\s*"([^"\\]*(?:\\.[^"\\]*)*)"/);
                        if (match && match[1]) {
                            content = match[1];
                            try { content = JSON.parse('"' + content + '"'); } catch(err){}
                        } else {
                            match = content.match(/"text_str"\s*:\s*"([^"\\]*(?:\\.[^"\\]*)*)"/);
                            if (match && match[1]) {
                                content = match[1];
                                try { content = JSON.parse('"' + content + '"'); } catch(err){}
                            }
                        }
                    }
                }
            }
            
            // Xử lý bước cuối: Chạy qua bộ lọc Auto-Correct trước khi trả về kết quả
            let finalString = String(content).trim();
            return autoCorrect(finalString);
        }

        function parseUniversalCapCut(json) {
            let textMap = {};
            
            function extractTexts(obj) {
                if (Array.isArray(obj)) {
                    obj.forEach(extractTexts);
                } else if (typeof obj === 'object' && obj !== null) {
                    if (obj.id && (obj.content !== undefined || obj.text !== undefined || obj.text_str !== undefined)) {
                        let cleanText = cleanTextExtremely(obj);
                        if (cleanText) textMap[obj.id] = cleanText;
                    }
                    for (let key in obj) { extractTexts(obj[key]); }
                }
            }
            extractTexts(json);

            let subtitles = [];
            function extractTimings(obj) {
                if (Array.isArray(obj)) {
                    obj.forEach(extractTimings);
                } else if (typeof obj === 'object' && obj !== null) {
                    let mId = obj.material_id || obj.id;
                    let tr = obj.target_timerange || obj.timerange || obj.time_range;
                    
                    if (mId && tr && textMap[mId]) {
                        let start = tr.start !== undefined ? tr.start : tr.startTime;
                        let duration = tr.duration;
                        
                        if (start !== undefined && duration !== undefined) {
                            let scale = 1000; 
                            if (duration > 0 && duration < 100000) scale = 1;

                            let startMs = start / scale;
                            let endMs = (start + duration) / scale;
                            
                            let exists = subtitles.find(s => s.id === mId && s.start === startMs);
                            if (!exists) {
                                subtitles.push({ id: mId, start: startMs, end: endMs, text: textMap[mId] });
                            }
                        }
                    }
                    for (let key in obj) { extractTimings(obj[key]); }
                }
            }
            extractTimings(json);

            if (subtitles.length === 0) return null;

            subtitles.sort((a, b) => a.start - b.start);
            let srt = "";
            subtitles.forEach((s, i) => {
                srt += `${i + 1}\n${formatSrtTime(s.start)} --> ${formatSrtTime(s.end)}\n${s.text}\n\n`;
            });
            return srt;
        }

        function formatSrtTime(ms) {
            if (isNaN(ms) || ms < 0) ms = 0;
            ms = Math.round(ms);
            let h = Math.floor(ms / 3600000); ms %= 3600000;
            let m = Math.floor(ms / 60000); ms %= 60000;
            let s = Math.floor(ms / 1000); ms %= 1000;
            return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')},${String(ms).padStart(3,'0')}`;
        }

        btnDownload.addEventListener('click', () => {
            if (!finalSrt) return;
            const blob = new Blob([finalSrt], { type: "text/srt;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "phude_capcut_vip.srt";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
